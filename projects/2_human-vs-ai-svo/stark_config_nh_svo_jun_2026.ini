[settings]

; ============================================================================
; STARK config for the AI-vs-Human SVO analysis (dataset: nh_svo_jun_2026)
; NOUN-nsubj + NOUN-obj variant.
;
; NOTE ON PROVENANCE: the actual pipeline did not read an .ini file — it drove
; STARK with these exact settings as command-line flags from
;   projects/2_human-vs-ai-svo/scripts/run_stark_svo_analysis.py
; Passing settings as CLI flags is a documented STARK feature (see STARK
; README) and is equivalent to an .ini file. This .ini reproduces the run
; byte-for-byte (verified against the real STARK output). The same settings
; were applied to every corpus file; large files were split into sentence-safe
; chunks before STARK. The input/output paths below are illustrative — set them
; to the corpus and output you want.
; ============================================================================

;___GENERAL SETTINGS___
input  = projects/2_human-vs-ai-svo/data/raw/nh_svo_jun_2026/<file>.conllu
output = projects/2_human-vs-ai-svo/data/interim/nh_svo_jun_2026/stark_svo_noun/tsv/<file>.tsv

;___TREE SPECIFICATIONS___
node_type      = form
labeled        = yes
label_subtypes = no
fixed          = yes

;___SEARCH BY QUERY___
query = upos=VERB >nsubj upos=NOUN >obj upos=NOUN

;___ADDITIONAL STATISTICS___
association_measures = no
complexity_measures  = no

;___VISUALISATION / OUTPUT COLUMNS___
node_info  = yes
head_info  = yes
grew_match = no
depsearch  = no
example    = no

; ************** ADVANCED SETTINGS **************
complete        = no
greedy_counter  = no
processing_size = 3
