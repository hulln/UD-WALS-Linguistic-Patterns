[settings]

; ============================================================================
; STARK config for the AI-vs-Human SVO analysis (dataset: nh_svo_jun_2026)
; NOUN-nsubj + NOUN-obj variant.
;
; PROVENANCE: the actual pipeline did not read an .ini file — it drove STARK
; with these exact settings as command-line flags from
;   projects/2_human-vs-ai-svo/scripts/run_stark_svo_analysis.py
; Passing settings as CLI flags is a documented STARK feature (STARK README) and
; is equivalent to an .ini. This file reproduces that run byte-for-byte (verified
; against the real STARK output). The same settings were applied to every corpus
; file; large files were split into sentence-safe chunks before STARK. The
; input/output paths below are illustrative — set them to what you want.
;
; This file follows STARK's official config.ini layout. Lines starting with ';'
; are OPTIONAL parameters that are switched OFF (same as in the STARK template).
; ============================================================================

; Detailed documentation of the settings is available in the 'settings.md' file (for basic settings) and 'advanced.md' (for advanced settings).
; To use optional parameters, such as 'head' or 'compare', uncomment them by deleting the semi-colon in the beginning of the line.

; ************** BASIC SETTINGS (see settings.md) **************
;___GENERAL SETTINGS___
input = projects/2_human-vs-ai-svo/data/raw/nh_svo_jun_2026/<file>.conllu
output = projects/2_human-vs-ai-svo/data/interim/nh_svo_jun_2026/stark_svo_noun/tsv/<file>.tsv

;___TREE SPECIFICATIONS___
node_type = form
labeled = yes
label_subtypes = no
fixed = yes

;___TREE RESTRICTIONS___
; NOTE: this is a query-based extraction, so STARK ignores tree-restriction
; settings such as 'size' (see settings.md: --query). They are left OFF here.
;size = 2-10000
;head = upos=VERB
;ignored_labels = punct
;allowed_labels = nsubj|obj

; ___SEARCH BY QUERY___
query = upos=VERB >nsubj upos=NOUN >obj upos=NOUN

;___ADDITIONAL STATISTICS___
association_measures = no
complexity_measures = no
;compare = sample/fr_gsd-ud-dev.conllu

;___VISUALISATION___
example = no
grew_match = no
depsearch = no
node_info = yes
head_info = yes

;___OUTPUT THRESHOLD___
;frequency_threshold = 5
;max_lines = 100


; ************** ADVANCED SETTINGS (see advanced.md) **************
;internal_saves = ./internal_saves
;cpu_cores = 12
;continuation_processing = no
greedy_counter = no
complete = no
processing_size = 3
;sentence_count_file = number_of_matched_trees_per_sentence.txt
;detailed_results_file = list_of_all_sentences_with_matched_trees.txt
